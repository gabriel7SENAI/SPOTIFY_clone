<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mini Spotify</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <section>
      <h1>Tocador de Musga</h1>

      <div>
        <button id="btnUpload">Cadastrar</button>
        <button id="btnPlayer">Player</button>
      </div>

      <div id="upload">
        <input type="text" id="audioURL" placeholder="URL do áudio da musga" />
        <input type="text" id="imgURL" placeholder="URL da capa da musga" />
        <button id="btnEnviar">Salvar musga</button>
      </div>

      <div id="player" style="display: none">
        <h2>Musgas</h2>
        <div id="lista"></div>
      </div>
    </section>

    <script type="module" src="main.js"></script>
  </body>
</html>
