<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>SPOTIFY clone</title>
  </head>
  <body>
    <section>
      <h1>Cadastrar Músicas</h1>
      <div id="conteiner">
        <div>
          <h3>Música</h3>
          <input type="file" id="musicaAudio" accept="audio/*" />
        </div>
        <div>
          <h3>Capa</h3>
          <input type="file" id="musicaImg" accept="image/*" />
        </div>
        <button id="btnEnviar">Enviar</button>
      </div>
    </section>

    <script type="module" src="main.js"></script>
  </body>
</html>
